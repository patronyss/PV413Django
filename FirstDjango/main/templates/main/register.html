{% extends 'main/base.html' %}

{% block title %} Реєстрація {% endblock %}

{% block content %}
    <form method="post">
        {% csrf_token %}

        {{form.non_field_errors}}

        {% for field in form %}
            <div class="field-wrapper">
                {{ field.label_tag }}
                {{ field }}
                {{ field.errors }}
            </div>
        {% endfor %}
        <button type="submit">Реєстрація</button>
    </form>
{% endblock %}
